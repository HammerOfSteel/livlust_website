# Nginx config for livslusths.se
# Installed to /etc/nginx/sites-available/livslusths.se
# by the deploy workflow on first run; Certbot then adds the HTTPS server block
# and turns the HTTP block into a redirect automatically.

server {
    listen 80;
    server_name livslusths.se www.livslusths.se;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Directus REST API & admin — strip /cms prefix before forwarding
    location /cms {
        rewrite ^/cms(.*) $1 break;
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    # Frontend static files served by the nginx container
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
